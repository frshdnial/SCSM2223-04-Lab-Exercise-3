<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WeatherNow Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<div class="container">
  <h1>🌤 WeatherNow</h1>

  <div class="search-box">
    <input type="text" id="cityInput" placeholder="Enter city name...">
    <button id="searchBtn">Search</button>
    <div class="unit-toggle">
        <button id="toggleUnit" class="unit-btn">Switch to °F</button>
    </div>
  </div>
  
  <div id="recentSearches" class="chip-container"></div>

  <p id="errorMsg"></p>

  <div class="card" id="currentWeather">
    <h2 id="cityName" class="skeleton"></h2>
    <p id="temp" class="temp skeleton"></p> 
    <p id="desc" class="description skeleton"></p>
    <p id="time" class="skeleton"></p>
  </div>

  <div id="forecast" class="forecast-row"></div>
</div>

<script src="app.js"></script>
</body>
</html>
