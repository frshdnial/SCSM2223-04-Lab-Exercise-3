<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WeatherNow Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<div class="container">
  <h1>🌤 WeatherNow</h1>

  <div class="search-box">
    <input type="text" id="cityInput" placeholder="Enter city name...">
    <button id="searchBtn">Search</button>
    <p id="errorMsg"></p>
  </div>

  <div class="card" id="currentWeather">
    <h2 id="cityName" class="skeleton"></h2>
    <p id="temp" class="skeleton"></p>
    <p id="desc" class="skeleton"></p>
    <p id="humidity" class="skeleton"></p>
    <p id="wind" class="skeleton"></p>
    <p id="time" class="skeleton"></p>
  </div>

  <div id="forecast" class="forecast-row">
    <!-- 7 cards -->
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
